name: Daily Lexus Search

on:
  schedule:
    # 7:45 CEST (UTC+2 in summer) = 05:45 UTC
    # 7:45 CET  (UTC+1 in winter) = 06:45 UTC
    # Using 05:45 UTC — runs year-round at approximately 7:45 local time
    - cron: '45 5 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to commit Excel back to repo

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl

      - name: Run AutoScout24 scraper
        run: python lexus_scraper.py

      - name: Update Excel file
        run: python lexus_excel_updater.py

      - name: Commit and push updated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add lexus_cars.xlsx lexus_combined.json lexus_as24.json
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "Daily update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
