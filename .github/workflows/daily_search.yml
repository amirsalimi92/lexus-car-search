name: Daily Lexus Search

on:
  schedule:
    # 7:45 CEST (UTC+2 summer) = 05:45 UTC
    - cron: '45 5 * * *'
  push:
    branches: [main]       # also run on every push (keeps schedule alive)
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openpyxl

      - name: Run AutoScout24 scraper
        run: python lexus_scraper.py

      - name: Update Excel file
        run: python lexus_excel_updater.py

      - name: Commit and push updated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add lexus_cars.xlsx lexus_combined.json lexus_as24.json
          git diff --staged --quiet || git commit -m "Auto update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push
